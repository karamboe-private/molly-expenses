name: molly_expenses
description: "Track Molly's expenses with receipt scanning and Firebase backend."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.4.0
  firebase_auth: ^6.1.4
  firebase_crashlytics: ^5.0.7
  cloud_firestore: ^6.1.2
  firebase_storage: ^13.0.6
  cloud_functions: ^6.0.6
  provider: ^6.1.5+1
  google_fonts: ^8.0.0
  uuid: ^4.5.2
  image_picker: ^1.2.1
  path: ^1.9.1
  intl: ^0.20.2
  fl_chart: ^1.0.0
  share_plus: ^12.0.1
  csv: ^6.0.0
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
